name: Build macOS DMG (诊断模式)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: 1. 拉取主代码
        uses: actions/checkout@v4
        with:
          path: Codelume

      - name: 2. 拉取依赖包
        uses: actions/checkout@v4
        with:
          repository: singulay-tech/CodelumeBundle
          path: CodelumeBundle

      - name: 2.5. 强行修改版本号
        run: |
          sed -i '' 's/6.2.0/6.1.0/g' CodelumeBundle/Package.swift
          sed -i '' 's/6.2/6.1/g' CodelumeBundle/Package.swift

      - name: 3. 执行编译 (并将日志存入黑匣子)
        run: |
          cd Codelume
          # 将几千行的输出全部装进 build.log 里，不再满屏乱刷
          # 加上 || true 防止因为报错导致后面的步骤直接中断
          xcodebuild build \
            -project Codelume.xcodeproj \
            -scheme Codelume \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="" \
            > build.log 2>&1 || true 

      - name: 4. 🔍 揪出真正的元凶 (请看这一步的输出)
        run: |
          cd Codelume
          echo "=========================================================="
          echo "🚨 导致打包失败的真正原因如下："
          echo "=========================================================="
          # 精准搜索包含 "error:" 的行，并附带上下各 3 行的上下文
          grep -i -A 3 -B 3 "error:" build.log
          echo "=========================================================="
