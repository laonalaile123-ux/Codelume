name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: 1. 拉取主代码
        uses: actions/checkout@v4
        with:
          path: Codelume

      - name: 2. 拉取依赖包
        uses: actions/checkout@v4
        with:
          repository: singulay-tech/CodelumeBundle
          path: CodelumeBundle

      - name: 2.5. 强行修改版本号
        run: |
          sed -i '' 's/6.2.0/6.1.0/g' CodelumeBundle/Package.swift
          sed -i '' 's/6.2/6.1/g' CodelumeBundle/Package.swift

      - name: 3. 编译 App (降维打击：使用普通 build 模式)
        run: |
          cd Codelume
          # 放弃 archive，改用 build，并将产物集中输出到 build_output 文件夹
          xcodebuild build \
            -project Codelume.xcodeproj \
            -scheme Codelume \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取并打包 DMG
        run: |
          cd Codelume
          mkdir -p ./dist
          # build 模式下，生成的 app 藏在 DerivedData 的这个深处目录里
          cp -R ./build_output/Build/Products/Release/*.app ./dist/ || echo "提取失败"
          
          # 打包成 DMG
          hdiutil create -volname "Codelume" -srcfolder ./dist -ov -format UDZO Codelume.dmg

      - name: 5. 上传成品提供下载
        uses: actions/upload-artifact@v4
        with:
          name: Codelume-DMG
          path: Codelume/Codelume.dmg
