name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Move Dependencies
        run: |
          # 关键操作：如果文件夹在子目录，把它移动到根目录
          if [ -d "CodeLume/CodelumeBundle" ]; then
            cp -R CodeLume/CodelumeBundle ./CodelumeBundle
            echo "Successfully moved CodelumeBundle to root."
          fi
          ls -d */ # 确认现在根目录下有哪些文件夹

      - name: Build App
        run: |
          xcodebuild archive \
            -project Codelume.xcodeproj \
            -scheme CodeLume \
            -configuration Release \
            -archivePath ./build/Codelume.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export App
        run: |
          mkdir -p ./dist
          cp -R ./build/Codelume.xcarchive/Products/Applications/*.app ./dist/ || echo "No app found"

      - name: Create DMG
        run: |
          hdiutil create -volname "Codelume" -srcfolder ./dist -ov -format UDZO Codelume.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codelume-DMG
          path: Codelume.dmg
