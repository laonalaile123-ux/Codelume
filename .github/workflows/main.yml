name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # 1. 拉取主代码，放在专属的 Codelume 文件夹下
      - name: 1. Checkout main code
        uses: actions/checkout@v4
        with:
          path: Codelume

      # 2. 拉取依赖包，放在并排的 CodelumeBundle 文件夹下
      - name: 2. Checkout CodelumeBundle
        uses: actions/checkout@v4
        with:
          repository: singulay-tech/CodelumeBundle
          path: CodelumeBundle

      # 3. 编译 App (关键：进入 Codelume 文件夹开始干活)
      - name: 3. Build App
        run: |
          cd Codelume
          xcodebuild archive \
            -project Codelume.xcodeproj \
            -scheme CodeLume \
            -configuration Release \
            -archivePath ./build/Codelume.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 4. 提取并打包 DMG
      - name: 4. Export App & Create DMG
        run: |
          cd Codelume
          mkdir -p ./dist
          cp -R ./build/Codelume.xcarchive/Products/Applications/*.app ./dist/ || echo "提取失败"
          hdiutil create -volname "Codelume" -srcfolder ./dist -ov -format UDZO Codelume.dmg

      # 5. 上传成品提供下载 (路径指向 Codelume 文件夹里的 dmg)
      - name: 5. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codelume-DMG
          path: Codelume/Codelume.dmg
