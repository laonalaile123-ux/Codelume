name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4

      - name: Download missing CodelumeBundle
        run: |
          # 核心修复：返回上一级目录，把缺失的兄弟仓库克隆下来
          cd ..
          git clone https://github.com/singulay-tech/CodelumeBundle.git
          echo "成功拉取 CodelumeBundle 依赖包！"

      - name: Build App
        run: |
          xcodebuild archive \
            -project Codelume.xcodeproj \
            -scheme CodeLume \
            -configuration Release \
            -archivePath ./build/Codelume.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export App
        run: |
          mkdir -p ./dist
          cp -R ./build/Codelume.xcarchive/Products/Applications/*.app ./dist/ || echo "No app found"

      - name: Create DMG
        run: |
          hdiutil create -volname "Codelume" -srcfolder ./dist -ov -format UDZO Codelume.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codelume-DMG
          path: Codelume.dmg
