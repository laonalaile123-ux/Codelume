name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Directory Structure
        run: |
          # 检查并修复 CodelumeBundle 的位置
          # 强制将 CodeLume 目录下的 bundle 链接到根目录，确保编译器能找到
          if [ -d "CodeLume/CodelumeBundle" ]; then
            ln -s "$PWD/CodeLume/CodelumeBundle" "$PWD/CodelumeBundle"
          fi
          ls -R # 打印目录结构方便排查

      - name: Build App
        run: |
          xcodebuild archive \
            -project Codelume.xcodeproj \
            -scheme CodeLume \
            -configuration Release \
            -archivePath ./build/Codelume.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export App
        run: |
          mkdir -p ./dist
          cp -R ./build/Codelume.xcarchive/Products/Applications/*.app ./dist/ || echo "No app found"

      - name: Create DMG
        run: |
          hdiutil create -volname "Codelume" -srcfolder ./dist -ov -format UDZO Codelume.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codelume-DMG
          path: Codelume.dmg
