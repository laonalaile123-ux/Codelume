name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: 1. 拉取主代码
        uses: actions/checkout@v4
        with:
          path: Codelume

      - name: 2. 拉取依赖包
        uses: actions/checkout@v4
        with:
          repository: singulay-tech/CodelumeBundle
          path: CodelumeBundle

      - name: 2.5. 强行修改版本号
        run: |
          sed -i '' 's/6.2.0/6.1.0/g' CodelumeBundle/Package.swift
          sed -i '' 's/6.2/6.1/g' CodelumeBundle/Package.swift

      - name: 3. 编译 App (修复签名权限问题)
        run: |
          cd Codelume
          # 关键修改：将 CODE_SIGN_IDENTITY 改为 "-"，允许临时签名
          xcodebuild archive \
            -project Codelume.xcodeproj \
            -scheme Codelume \
            -configuration Release \
            -archivePath ./build/Codelume.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取并打包 DMG
        run: |
          cd Codelume
          mkdir -p ./dist
          cp -R ./build/Codelume.xcarchive/Products/Applications/*.app ./dist/ || echo "提取失败"
          hdiutil create -volname "Codelume" -srcfolder ./dist -ov -format UDZO Codelume.dmg

      - name: 5. 上传成品提供下载
        uses: actions/upload-artifact@v4
        with:
          name: Codelume-DMG
          path: Codelume/Codelume.dmg
